const daysGrid = document.getElementById("daysGrid");

function renderCards(filter=""){
    daysGrid.innerHTML = "";

    for(let day = 1; day <= 60; day++){
        if(!(`Day ${day}`.toLowerCase().includes(filter.toLowerCase()))){
            continue;
        }

        const card = document.createElement("div");
        card.className = "day-card";
        let html = "";

        if(recordings[day] && recordings[day].length > 0 && recordings[day][0].title !== ""){
            recordings[day].forEach(record => {
                html += `
                    <a class="record-btn" href="${record.link}" target="_blank">
                        ▶ ${record.title}
                    </a>
                `;
            });
        } else {
            html = `
                <div class="empty">
                    No Recording Yet
                </div>
            `;
        }

        card.innerHTML = `
            <div class="day-title">Day ${day}</div>
            ${html}
        `;
        daysGrid.appendChild(card);
    }
}

function toggleResources(){
    const panel = document.getElementById("resourcesPanel");
    if(panel.style.display === "block"){
        panel.style.display = "none";
    } else {
        panel.style.display = "block";
    }
}

// Initial Render
renderCards();

// Search Box Listener
document.getElementById("searchInput").addEventListener("input", function(){
    renderCards(this.value);
});
